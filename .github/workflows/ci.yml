name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format and lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust with quality tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  docs:
    name: Documentation site
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate container definition
        run: docker compose -f compose.docs.yml config --quiet

      - name: Build and start documentation
        run: docker compose -f compose.docs.yml up --build -d --wait

      - name: Verify documentation routes
        run: |
          curl --fail --silent --show-error --output /dev/null http://127.0.0.1:8080/
          curl --fail --silent --show-error --output /dev/null http://127.0.0.1:8080/retrieval.html
          curl --fail --silent --show-error --output /dev/null http://127.0.0.1:8080/self-hosting.html
          curl --fail --silent --show-error --output /dev/null http://127.0.0.1:8080/healthz

      - name: Stop documentation
        if: always()
        run: docker compose -f compose.docs.yml down --volumes

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked --all-targets --all-features
