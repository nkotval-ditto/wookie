services:
  docs:
    build:
      context: .
      dockerfile: deploy/docs/Dockerfile
    ports:
      - "${WOOKIE_DOCS_BIND:-127.0.0.1}:${WOOKIE_DOCS_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    pids_limit: 64
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
