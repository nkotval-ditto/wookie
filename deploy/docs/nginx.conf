server {
    listen 8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location = /healthz {
        access_log off;
        default_type text/plain;
        expires -1;
        return 200 "ok\n";
    }

    location / {
        expires -1;
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|webp|ico|svg|wasm)$ {
        expires 1h;
        try_files $uri =404;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css text/javascript application/javascript application/json application/wasm;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "base-uri 'self'; form-action 'none'; frame-ancestors 'none'; object-src 'none'" always;
}
